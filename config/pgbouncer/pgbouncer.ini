; PgBouncer configuration for local Docker development.
; Backend: db (PostgreSQL). App connects to this container.

[databases]
; Format: dbname = host=... port=... dbname=...
; * means any database name (client can specify); maps to drf_starter backend.
* = host=db port=5432 dbname=drf_starter

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 25
; Logging
log_connections = 1
log_disconnections = 1
admin_users = postgres
