# PostgreSQL client authentication — Docker Compose primary (`db` service).
# Mounted via `hba_file` so replication works from non-localhost peers (Docker network).
#
# Important: in pg_hba.conf, database name "all" does NOT match replication connections;
# replication must have its own records (see PostgreSQL docs).
#
# TYPE     DATABASE     USER         ADDRESS           METHOD

# Local socket
local      all          all                            trust

# IPv4/IPv6 localhost
host       all          all          127.0.0.1/32      md5
host       all          all          ::1/128           md5

# Replication from localhost (init tools)
local      replication  all                            trust
host       replication  all          127.0.0.1/32      md5
host       replication  all          ::1/128           md5

# Streaming standby from other containers (pg_basebackup / WAL streaming)
# Non-SSL TCP ("no encryption") requires hostnossl for a clear match on some setups.
hostnossl  replication  replicator   0.0.0.0/0         md5
host       replication  replicator   0.0.0.0/0         md5

# Application connections from Docker network (Django, pgbouncer, etc.)
hostnossl  all          all          0.0.0.0/0         md5
