services:
  # Postgres with md5 password storage so pgbouncer (edoburu image uses MD5 userlist) can auth.
  # After adding this, run: docker compose down -v && docker compose up -d  ( -v recreates DB volume so password is stored as md5 at initdb )
  db:
    image: postgres:15
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      POSTGRES_HOST_AUTH_METHOD: md5
    command: ["postgres", "-c", "password_encryption=md5"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      # Override DATABASE_URL so entrypoint generates backend=db (not pgbouncer from app URL)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-drf_starter}
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=2000
      - PGBOUNCER_DEFAULT_POOL_SIZE=100
      - PGBOUNCER_AUTH_TYPE=trust
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    stop_grace_period: 10s

  web:
    build: .
    command: ["/app/entrypoint.sh"]
    volumes:
      - .:/app
      - web_venv:/app/.venv
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: uv run celery -A config.celery.app worker --loglevel=info
    volumes:
      - .:/app
      - celery_venv:/app/.venv
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  celery_beat:
    build: .
    command: uv run celery -A config.celery.app beat --loglevel=info
    volumes:
      - .:/app
      - celery_venv:/app/.venv
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres_data:
  redis_data:
  web_venv:
  celery_venv: